<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./dist/style.css" />
    <title>Tasbih</title>
  </head>
  <body>
    <div class="grid grid-cols-12 h-screen bg-white">
      <!--Mobile NavBar-->
      <div
        class="w-full bg-[#1F7A4D] z-10 sm:hidden rounded-tl-3xl rounded-tr-3xl h-16 bottom-0 fixed"
      >
        <div
          class="flex justify-around text-white text-3xl items-center h-full"
        >
          <a href="index.html"
            ><div>
              <div class="text-gray-400">
                <iconify-icon
                  icon="material-symbols:home-rounded"
                ></iconify-icon>
              </div></div
          ></a>

          <div>
            <iconify-icon
              class="scale-120"
              icon="hugeicons:tasbih"
            ></iconify-icon>
          </div>

          <a href="AsmaulHusna.html"
            ><div>
              <iconify-icon
                class="text-gray-400"
                icon="iconoir:flower"
              ></iconify-icon></div
          ></a>

          <a href="quiz.html"
            ><div>
              <iconify-icon
                class="text-gray-400"
                icon="fluent:quiz-28-filled"
              ></iconify-icon></div
          ></a>
        </div>
      </div>

      <!--Left Side NavBar-->

      <div
        class="sm:w-52 sm:left-0 hidden sm:top-0 sm:block sm:fixed sm:h-screen bg-white shadow-md"
      >
        <div class="flex items-center gap-3 mt-4 ml-4">
          <img class="h-10 bg-transparent" src="./assets/image.png" alt="" />
          <h1 class="text-2xl text-[#1F7A4D]">DeenHub</h1>
        </div>

        <div class="flex flex-col mt-10 ml-4 gap-4">
          <a href="index.html">
            <div
              class="flex text-[#1F7A4D] p-2 rounded-md hover:bg-[#1f7a4c70] items-center gap-3"
            >
              <iconify-icon
                class="text-2xl"
                icon="material-symbols:home-rounded"
              ></iconify-icon>
              <p class="text-xl">Home</p>
            </div>
          </a>

          <a href="tasbeh.html"
            ><div
              class="flex text-[#1F7A4D] p-2 rounded-md bg-[#1f7a4c70] items-center gap-3"
            >
              <iconify-icon
                class="text-2xl"
                icon="hugeicons:tasbih"
              ></iconify-icon>
              <p class="text-xl">Tasbih</p>
            </div></a
          >

          <a href="AsmaulHusna.html">
            <div
              class="flex text-[#1F7A4D] p-2 rounded-md hover:bg-[#1f7a4c70] items-center gap-3"
            >
              <iconify-icon
                class="text-2xl"
                icon="iconoir:flower"
              ></iconify-icon>
              <p class="text-xl">Asmaul Husna</p>
            </div>
          </a>

          <div
            class="flex lg:hidden p-2 rounded-md hover:bg-[#1f7a4c70] text-[#1F7A4D] items-center gap-3"
          >
            <iconify-icon
              class="text-2xl"
              icon="fluent:quiz-28-filled"
            ></iconify-icon>
            <p class="text-xl">Quiz</p>
          </div>

          <a href="about.html"
            ><div
              class="flex p-2 rounded-md text-[#1F7A4D] hover:bg-[#1f7a4c70] items-center gap-3"
            >
              <iconify-icon class="text-2xl" icon="mdi:about"></iconify-icon>
              <p class="text-xl">About</p>
            </div></a
          >
        </div>
      </div>

      <!--Right Side Div Main View-->

      <div class="sm:ml-52 col-span-12">
        <div class="fixed top-0 w-full bg-white">
          <div
            class="sm:h-20 flex items-center justify-between pr-10 shadow-sm"
          >
            <div class="flex py-4 sm:hidden items-center gap-3 mt-4 ml-4">
              <img
                class="h-10 bg-transparent"
                src="./assets/image.png"
                alt=""
              />
              <h1 class="text-2xl text-[#1F7A4D]">DeenHub</h1>
            </div>

            <a class="sm:hidden" href="about.html"
              ><div>
                <iconify-icon
                  class="text-2xl text-[#1F7A4D]"
                  icon="mdi:about"
                ></iconify-icon></div
            ></a>
          </div>
        </div>

        <div class="flex items-center justify-center h-[80%]">
          <div class="grid text-center grid-cols-1">
            <div>
              <iconify-icon
                id="numUP"
                class="text-5xl text-[#1F7A4D]"
                icon="mingcute:up-line"
              ></iconify-icon>
            </div>

            <div
              class="p-5 m-7 w-36 rounded-lg text-4xl bg-[#1F7A4D] text-white font-bold shadow-lg shadow-[#1F7A4D] flex items-center justify-center"
            >
              <p id="countnum">100</p>
            </div>

            <div>
              <iconify-icon
                id="numDown"
                class="text-5xl text-[#1F7A4D]"
                icon="mingcute:down-line"
              ></iconify-icon>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>

    <script src="./script.js"></script>
  </body>
</html>
