<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./dist/style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="grid grid-cols-12 h-screen bg-white">
      <!--Mobile NavBar-->
      <div
        class="w-full bg-[#1F7A4D] z-10 sm:hidden rounded-tl-3xl rounded-tr-3xl h-16 bottom-0 fixed"
      >
        <div
          class="flex justify-around text-white text-3xl items-center h-full"
        >
          <a href="index.html"
            ><div>
              <div class="text-gray-400">
                <iconify-icon
                  icon="material-symbols:home-rounded"
                ></iconify-icon>
              </div></div
          ></a>

          <a href="tasbeh.html">
            <div>
              <iconify-icon
                class="text-gray-400"
                icon="hugeicons:tasbih"
              ></iconify-icon>
            </div>
          </a>

          <div>
            <iconify-icon
              class="text-gray-400"
              icon="majesticons:book-open"
            ></iconify-icon>
          </div>

          <a href="AsmaulHusna.html"
            ><div class="text-center text-gray-400">
              <iconify-icon icon="iconoir:flower"></iconify-icon></div
          ></a>

          <div>
            <iconify-icon
              class="scale-120"
              icon="fluent:quiz-28-filled"
            ></iconify-icon>
          </div>
        </div>
      </div>

      <!--Left Side NavBar-->

      <div
        class="sm:w-52 left-0 top-0 sm:block hidden sm:fixed h-screen bg-white shadow-md"
      >
        <div class="flex items-center gap-3 mt-4 ml-4">
          <img class="h-10 bg-transparent" src="./assets/image.png" alt="" />
          <h1 class="text-2xl text-[#1F7A4D]">DeenHub</h1>
        </div>

        <div class="flex flex-col mt-10 ml-4 gap-4">
          <div class="flex text-[#1F7A4D] items-center gap-3">
            <iconify-icon
              class="text-2xl"
              icon="material-symbols:home-rounded"
            ></iconify-icon>
            <p class="text-xl">Home</p>
          </div>

          <div class="flex text-[#1F7A4D] items-center gap-3">
            <iconify-icon
              class="text-2xl"
              icon="hugeicons:tasbih"
            ></iconify-icon>
            <p class="text-xl">Tasbih</p>
          </div>

          <div class="flex text-[#1F7A4D] items-center gap-3">
            <iconify-icon
              class="text-2xl"
              icon="majesticons:book-open"
            ></iconify-icon>
            <p class="text-xl">Hadith</p>
          </div>

          <div class="flex text-[#1F7A4D] items-center gap-3">
            <iconify-icon class="text-2xl" icon="iconoir:flower"></iconify-icon>
            <p class="text-xl">Asmaul Husna</p>
          </div>

          <div class="flex text-[#1F7A4D] items-center gap-3">
            <iconify-icon
              class="text-2xl"
              icon="fluent:quiz-28-filled"
            ></iconify-icon>
            <p class="text-xl">Quiz</p>
          </div>

          <div class="flex text-[#1F7A4D] items-center gap-3">
            <iconify-icon class="text-2xl" icon="mdi:about"></iconify-icon>
            <p class="text-xl">About</p>
          </div>
        </div>
      </div>

      <!--Right Side Div Main View-->

      <div class="sm:ml-52 col-span-12">
        <div class="sm:h-20 flex items-center justify-between pr-10 shadow-sm">
          <div class="flex py-4 sm:hidden items-center gap-3 mt-4 ml-4">
            <img class="h-10 bg-transparent" src="./assets/image.png" alt="" />
            <h1 class="text-2xl text-[#1F7A4D]">DeenHub</h1>
          </div>

          <a class="sm:hidden" href="about.html"
            ><div>
              <iconify-icon
                class="text-2xl text-[#1F7A4D]"
                icon="mdi:about"
              ></iconify-icon></div
          ></a>
        </div>

        <div class="p-4">
          <div
            class="w-full flex justify-between rounded-md items-center p-4 shadow-md h-16"
          >
            <div class="flex gap-3">
              <iconify-icon class="text-xl" icon="noto:trophy"></iconify-icon>
              <p>120</p>
            </div>
            <div class="w-36 text-center">
              <p><span>1</span> of 20</p>
              <!-- Track Background -->
              <div class="h-3 bg-slate-200 rounded-full overflow-hidden">
                <!-- Filled Progress Line -->
                <!-- Update the style="width: XX%" dynamically with JavaScript -->
                <div
                  class="h-full w-full bg-emerald-500 transition-all duration-300 ease-out"
                  style="width: 10%"
                ></div>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <iconify-icon
                class="text-xl text-[#1F7A4D]"
                icon="icon-park-outline:time"
              ></iconify-icon>
              <p>00:25</p>
            </div>
          </div>
        </div>

        <div class="p-4">
          <div class="w-full h-48 rounded-md shadow-md border-[#1F7A4D] border">
            <div class="flex justify-center relative">
              <iconify-icon
                class="absolute text-6xl -top-7.5 text-[#1F7A4D]"
                icon="streamline-sharp:octagram-shape-solid"
              >
                <p>4</p>
              </iconify-icon>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>

    <script src="./script.js"></script>
  </body>
</html>
