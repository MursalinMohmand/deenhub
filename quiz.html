<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./dist/style.css" />
    <title>Quiz</title>
  </head>
  <body>
    <div class="grid grid-cols-12 h-screen bg-white">
      <!--Mobile NavBar-->
      <div
        class="w-full bg-[#1F7A4D] z-10 sm:hidden rounded-tl-3xl rounded-tr-3xl h-16 bottom-0 fixed"
      >
        <div
          class="flex justify-around text-white text-3xl items-center h-full"
        >
          <a href="index.html"
            ><div>
              <div class="text-gray-400">
                <iconify-icon
                  icon="material-symbols:home-rounded"
                ></iconify-icon>
              </div></div
          ></a>

          <a href="tasbeh.html">
            <div>
              <iconify-icon
                class="text-gray-400"
                icon="hugeicons:tasbih"
              ></iconify-icon>
            </div>
          </a>

          <a href="AsmaulHusna.html"
            ><div class="text-center text-gray-400">
              <iconify-icon icon="iconoir:flower"></iconify-icon></div
          ></a>

          <div>
            <iconify-icon
              class="scale-120"
              icon="fluent:quiz-28-filled"
            ></iconify-icon>
          </div>
        </div>
      </div>

      <!--Left Side NavBar-->

      <div
        class="sm:w-52 sm:left-0 hidden sm:top-0 sm:block sm:fixed sm:h-screen bg-white shadow-md"
      >
        <div class="flex items-center gap-3 mt-4 ml-4">
          <img class="h-10 bg-transparent" src="./assets/image.png" alt="" />
          <h1 class="text-2xl text-[#1F7A4D]">DeenHub</h1>
        </div>

        <div class="flex flex-col mt-10 ml-4 gap-4">
          <a href="index.html">
            <div class="flex text-[#1F7A4D] items-center gap-3">
              <iconify-icon
                class="text-2xl"
                icon="material-symbols:home-rounded"
              ></iconify-icon>
              <p class="text-xl">Home</p>
            </div>
          </a>

          <a href="tasbeh.html"
            ><div class="flex text-[#1F7A4D] items-center gap-3">
              <iconify-icon
                class="text-2xl"
                icon="hugeicons:tasbih"
              ></iconify-icon>
              <p class="text-xl">Tasbih</p>
            </div></a
          >

          <a href="AsmaulHusna.html">
            <div class="flex text-[#1F7A4D] items-center gap-3">
              <iconify-icon
                class="text-2xl"
                icon="iconoir:flower"
              ></iconify-icon>
              <p class="text-xl">Asmaul Husna</p>
            </div>
          </a>

          <div class="flex lg:hidden text-[#1F7A4D] items-center gap-3">
            <iconify-icon
              class="text-2xl"
              icon="fluent:quiz-28-filled"
            ></iconify-icon>
            <p class="text-xl">Quiz</p>
          </div>

          <a href="about.html"
            ><div class="flex text-[#1F7A4D] items-center gap-3">
              <iconify-icon class="text-2xl" icon="mdi:about"></iconify-icon>
              <p class="text-xl">About</p>
            </div></a
          >
        </div>
      </div>

      <!--Right Side Div Main View-->

      <div class="sm:ml-52 col-span-12">
        <div class="fixed top-0 bg-white w-full">
          <div
            class="sm:h-20 flex items-center justify-between pr-10 shadow-sm"
          >
            <div class="flex py-4 sm:hidden items-center gap-3 mt-4 ml-4">
              <img
                class="h-10 bg-transparent"
                src="./assets/image.png"
                alt=""
              />
              <h1 class="text-2xl text-[#1F7A4D]">DeenHub</h1>
            </div>

            <a class="sm:hidden" href="about.html"
              ><div>
                <iconify-icon
                  class="text-2xl text-[#1F7A4D]"
                  icon="mdi:about"
                ></iconify-icon></div
            ></a>
          </div>
        </div>

        <div class="p-4 scr mt-20">
          <div
            class="w-full flex justify-between rounded-md items-center p-4 shadow-md h-16"
          >
            <div class="w-full text-center">
              <p><span id="crq">1</span> of 20</p>

              <div class="h-3 bg-slate-200 rounded-full overflow-hidden">
                <div
                  id="progressBar"
                  class="h-full w-full bg-emerald-500 transition-all duration-300 ease-out"
                ></div>
              </div>
            </div>
          </div>
        </div>

        <div class="p-4">
          <div
            class="quiztext w-full rounded-md shadow-md border-[#1F7A4D] border"
          >
            <div class="px-5 py-8">
              <h1 class="qText">Quesion show Here....</h1>
            </div>
            <div class="hidden resetButton">
              <div class="flex justify-center py-4">
                <button
                  class="restart w-full py-2 mx-4 rounded-md text-white bg-[#1F7A4D]"
                >
                  Restart
                </button>
              </div>
            </div>
          </div>

          <div id="options" class="py-4 flex flex-col gap-3"></div>
        </div>
      </div>
    </div>

    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>

    <script src="./script.js"></script>
  </body>
</html>
